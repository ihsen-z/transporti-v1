# ============================================================
# Transporti V1 — Docker Compose (PostgreSQL + Backend + Frontend)
# ============================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: transporti_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: transporti_v1
      POSTGRES_USER: transporti
      POSTGRES_PASSWORD: transporti_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transporti -d transporti_v1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transporti_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://transporti:transporti_dev@db:5432/transporti_v1
      - SECRET_KEY=django-docker-xg8c9b26d9e64ajdr-dt-ognbnnnh-d72wi25-transporti-v1-secret-key-2026
      - JWT_SECRET_KEY=jwt-docker-xg8c9b26d9e64ajdr-dt-ognbnnnh-d72wi25-transporti-v1-jwt-key-2026
      - DEBUG=True
      - ENV=development
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '⏳ Running migrations...' &&
        python manage.py migrate --noinput &&
        echo '✅ Migrations done.' &&
        echo '🚀 Starting Django server...' &&
        python manage.py runserver 0.0.0.0:8000
      "

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transporti_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_TIMEOUT=5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: >
      sh -c "
        npm install &&
        npm run dev
      "

  # ── Scheduler (Periodic Tasks) ──────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transporti_scheduler
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://transporti:transporti_dev@db:5432/transporti_v1
      - SECRET_KEY=django-docker-xg8c9b26d9e64ajdr-dt-ognbnnnh-d72wi25-transporti-v1-secret-key-2026
      - JWT_SECRET_KEY=jwt-docker-xg8c9b26d9e64ajdr-dt-ognbnnnh-d72wi25-transporti-v1-jwt-key-2026
      - DEBUG=True
      - ENV=development
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '⏳ Waiting for backend migrations...' &&
        sleep 10 &&
        echo '🕐 Starting scheduler...' &&
        python manage.py run_scheduled_tasks
      "

volumes:
  pgdata:
  backend_media:
