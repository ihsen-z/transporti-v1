name: Frontend CI

on:
  push:
    branches: [ "master", "develop" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Check formatting (Prettier)
      run: npx prettier --check .
      continue-on-error: true

    - name: Run Linter (ESLint)
      run: npm run lint 2>&1 | head -100
      continue-on-error: true

    - name: Type checking (TypeScript)
      run: npm run typecheck 2>&1 | head -100
      continue-on-error: true

    - name: Build Next.js application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_API_TIMEOUT: 5000

    - name: Check bundle size
      if: success()
      run: |
        echo "## 📦 Build Output" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        du -sh .next/ 2>/dev/null || echo "Build folder not found"
        echo '```' >> $GITHUB_STEP_SUMMARY
        # List page sizes
        if [ -d ".next/server/app" ]; then
          echo "### Page Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find .next/server/app -name "*.html" -exec du -h {} \; | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: Build Summary
      if: always()
      run: |
        echo "## 🚀 Frontend CI Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Node: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
        echo "- Next.js build: ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
