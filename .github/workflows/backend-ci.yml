name: Backend CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: transporti_test
          POSTGRES_USER: transporti
          POSTGRES_PASSWORD: transporti_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django Checks
      env:
        DATABASE_URL: postgres://transporti:transporti_dev@localhost:5432/transporti_test
        SECRET_KEY: ci-test-secret-key-12345
        DEBUG: "True"
        ENV: test
      run: |
        python manage.py check

    - name: Run Migrations
      env:
        DATABASE_URL: postgres://transporti:transporti_dev@localhost:5432/transporti_test
        SECRET_KEY: ci-test-secret-key-12345
        DEBUG: "True"
        ENV: test
      run: |
        python manage.py migrate

    - name: Run Tests (if any)
      env:
        DATABASE_URL: postgres://transporti:transporti_dev@localhost:5432/transporti_test
        SECRET_KEY: ci-test-secret-key-12345
        DEBUG: "True"
        ENV: test
      run: |
        python manage.py test || echo "No tests defined or tests failed. Continuing..."
