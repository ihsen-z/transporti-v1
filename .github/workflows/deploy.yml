name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip CI checks (emergency only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  # =================================================================
  #  Pre-flight checks
  # =================================================================
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      deploy_env: ${{ github.event.inputs.environment }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set variables
      id: vars
      run: |
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "🚀 Deploying commit $(git rev-parse --short HEAD) to ${{ github.event.inputs.environment }}"

    - name: Verify branch
      if: github.event.inputs.environment == 'production'
      run: |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [ "$BRANCH" != "master" ]; then
          echo "❌ Production deployments only allowed from master branch (current: $BRANCH)"
          exit 1
        fi

  # =================================================================
  #  Backend checks
  # =================================================================
  backend-check:
    needs: preflight
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: transporti_test
          POSTGRES_USER: transporti
          POSTGRES_PASSWORD: transporti_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://transporti:transporti_dev@localhost:5432/transporti_test
      SECRET_KEY: ci-deploy-check-secret-key-12345
      JWT_SECRET_KEY: ci-deploy-jwt-secret-key-12345
      DEBUG: "False"
      ENV: test

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'

    - name: Install & Verify
      run: |
        pip install -r requirements.txt
        python manage.py check --deploy
        python manage.py migrate
        python manage.py collectstatic --noinput 2>/dev/null || true

  # =================================================================
  #  Frontend checks
  # =================================================================
  frontend-check:
    needs: preflight
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Build
      run: |
        npm ci
        npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ github.event.inputs.environment == 'production' && 'https://api.transporti.tn' || 'https://staging-api.transporti.tn' }}

  # =================================================================
  #  Deploy
  # =================================================================
  deploy:
    needs: [preflight, backend-check, frontend-check]
    if: always() && (needs.preflight.result == 'success') && (needs.backend-check.result == 'success' || github.event.inputs.skip_tests == 'true') && (needs.frontend-check.result == 'success' || github.event.inputs.skip_tests == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy Summary
      run: |
        echo "## 🚀 Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Environment** | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Commit** | ${{ needs.preflight.outputs.sha_short }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Tests skipped** | ${{ github.event.inputs.skip_tests }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> ⚠️ Actual deployment commands (SSH/Docker) should be configured below." >> $GITHUB_STEP_SUMMARY

    # ============================================================
    #  DEPLOYMENT COMMANDS — CONFIGURE FOR YOUR INFRASTRUCTURE
    # ============================================================
    #
    # Option A: SSH Deploy (VPS / Dedicated Server)
    # - name: Deploy via SSH
    #   uses: appleboy/ssh-action@v1.0.3
    #   with:
    #     host: ${{ secrets.DEPLOY_HOST }}
    #     username: ${{ secrets.DEPLOY_USER }}
    #     key: ${{ secrets.DEPLOY_SSH_KEY }}
    #     script: |
    #       cd /opt/transporti
    #       git pull origin master
    #       docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build
    #       docker compose exec backend python manage.py migrate
    #       docker compose exec backend python manage.py collectstatic --noinput
    #
    # Option B: Docker Registry + Pull
    # - name: Build & Push Docker Image
    #   run: |
    #     docker build -t registry.example.com/transporti-backend:${{ needs.preflight.outputs.sha_short }} ./backend
    #     docker push registry.example.com/transporti-backend:${{ needs.preflight.outputs.sha_short }}
    #
    # Option C: DigitalOcean App Platform / Railway / Render
    # - uses: digitalocean/app_action@v2
    #   with:
    #     app_name: transporti-${{ github.event.inputs.environment }}
    #     token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Post-deploy Health Check
      run: |
        echo "::notice::Deploy step placeholder — configure your deployment target above"
        echo "After deployment, verify: curl -s https://api.transporti.tn/health/ | jq ."

  # =================================================================
  #  Notify
  # =================================================================
  notify:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Deployment Notification
      run: |
        if [ "${{ needs.deploy.result }}" == "success" ]; then
          echo "✅ Deployment to ${{ github.event.inputs.environment }} succeeded"
        else
          echo "❌ Deployment to ${{ github.event.inputs.environment }} failed"
        fi
        # Add Slack/Discord webhook notification here:
        # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
        #   -H 'Content-type: application/json' \
        #   -d '{"text": "🚀 Transporti deployed to ${{ github.event.inputs.environment }} by ${{ github.actor }}"}'
