# ============================================================================
# Transporti V1 — Docker Compose PRODUCTION Override
# ============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# ============================================================================

services:

  # ── PostgreSQL (Production hardened) ──────────────────────
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transporti_prod}
      POSTGRES_USER: ${POSTGRES_USER:-transporti_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports: []  # No external port exposure in production
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./backups:/backups

  # ── Django Backend (Gunicorn + Production) ───────────────
  backend:
    environment:
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      - DEBUG=False
      - ENV=production
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-transporti.tn,api.transporti.tn}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://transporti.tn}
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-KONNECT}
      - KONNECT_API_KEY=${KONNECT_API_KEY}
      - KONNECT_WALLET_ID=${KONNECT_WALLET_ID}
      - KONNECT_API_URL=${KONNECT_API_URL:-https://api.konnect.network/api/v2}
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET}
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=${EMAIL_HOST:-smtp.sendgrid.net}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=True
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-apikey}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@transporti.tn}
      - FRONTEND_URL=${FRONTEND_URL:-https://transporti.tn}
    volumes:
      - backend_media_prod:/app/media
      - backend_static:/app/staticfiles
    command: >
      sh -c "
        echo '⏳ Running migrations...' &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        echo '🚀 Starting Gunicorn (production)...' &&
        gunicorn transporti_core.wsgi:application
          --bind 0.0.0.0:8000
          --workers 4
          --timeout 120
          --access-logfile -
          --error-logfile -
      "

  # ── Next.js Frontend (Production build) ──────────────────
  frontend:
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.transporti.tn}
      - NEXT_PUBLIC_API_TIMEOUT=10000
    volumes: []  # No source mounting in production
    command: >
      sh -c "
        npm run build &&
        npm run start
      "

  # ── Nginx Reverse Proxy (HTTPS termination) ─────────────
  nginx:
    image: nginx:alpine
    container_name: transporti_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/var/www/static:ro
      - backend_media_prod:/var/www/media:ro
    depends_on:
      - backend
      - frontend

  # ── Scheduler (Production) ──────────────────────────────
  scheduler:
    environment:
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      - DEBUG=False
      - ENV=production
    volumes:
      - backend_media_prod:/app/media

  # ── DB Backup (daily at 3 AM) ───────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: transporti_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transporti_prod}
      POSTGRES_DB: ${POSTGRES_DB:-transporti_prod}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo '🗄 Backup service started. Running daily at 3:00 AM...' &&
        while true; do
          CURRENT_HOUR=$$(date +%H) &&
          CURRENT_MIN=$$(date +%M) &&
          if [ \"$$CURRENT_HOUR\" = '03' ] && [ \"$$CURRENT_MIN\" = '00' ]; then
            TIMESTAMP=$$(date +%Y%m%d_%H%M%S) &&
            echo \"[$$TIMESTAMP] Starting backup...\" &&
            pg_dump -h db -U ${POSTGRES_USER:-transporti_prod} -d ${POSTGRES_DB:-transporti_prod} \
              --no-owner --no-privileges | gzip > /backups/transporti_$$TIMESTAMP.sql.gz &&
            echo \"[$$TIMESTAMP] Backup complete.\" &&
            find /backups -name 'transporti_*.sql.gz' -mtime +30 -delete &&
            echo '[Cleanup] Old backups removed.'
          fi &&
          sleep 60
        done
      "

volumes:
  pgdata_prod:
  backend_media_prod:
  backend_static:
